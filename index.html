<!doctype html>
<html lang="ko" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Suneung Math Arena - Suneung No. 21 Math Variant Gladiator Combat</title>
    
    <!-- Meta details suitable for a high-quality GitHub Pages page -->
    <meta name="description" content="AI-inspired real-time Suneung Math No. 21 level variant classroom combat arena. Live competitive matching with advanced LaTeX formula renders." />
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Outfit", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            boxShadow: {
              'neon-cyan': '0 0 15px rgba(34, 211, 238, 0.25)',
              'neon-purple': '0 0 15px rgba(168, 85, 247, 0.25)'
            }
          }
        }
      }
    </script>
    
    <!-- KaTeX CSS & JS for 100% accurate mathematical parsing -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Immersive Theme Styles -->
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col font-sans overflow-x-hidden antialiased">
    
    <!-- High-priority floating mathematical symbols for aesthetic decoration -->
    <div class="math-decor select-none text-[120px] top-12 left-[10%] opacity-[0.02]">f(x) = \int_a^b g(t) dt</div>
    <div class="math-decor select-none text-[140px] bottom-16 right-[8%] opacity-[0.02]">\sum_{n=1}^\infty a_n</div>
    <div class="math-decor select-none text-[100px] top-1/3 right-[15%] opacity-[0.02]">\lim_{\theta \to 0} \frac{\sin\theta}{\theta}</div>
    <div class="math-decor select-none text-[110px] bottom-1/3 left-[5%] opacity-[0.02]">a_{n+1} = a_n + k</div>

    <!-- Main dynamic element mounting anchor -->
    <div id="app" class="flex-grow flex flex-col"></div>

    <!-- Absolute toast message wrapper -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center justify-center space-y-2 pointer-events-none hidden"></div>

    <!-- Core interactive client script engine -->
    <script defer src="/script.js"></script>
    
  </body>
</html>
